{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
    <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Masuk ke <span class="text-primary">MyKost</span></h2>

    <form action="/login" method="POST" class="space-y-5">
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Username</label>
            <input type="text" name="username" required class="w-full p-3 rounded-xl border border-gray-300 focus:border-primary outline-none">
        </div>
        <div>
            <div class="flex justify-between">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label>
                <a href="/forgot-password" class="text-xs font-bold text-primary hover:underline">Lupa Password?</a>
            </div>
            <input type="password" name="password" required class="w-full p-3 rounded-xl border border-gray-300 focus:border-primary outline-none">
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-primarydark text-white font-bold py-3 rounded-xl transition shadow-lg">Login</button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-600">Belum punya akun? <a href="/register" class="text-primary font-bold hover:underline">Daftar Disini</a></p>
    </div>
</div>
{% endblock %}
