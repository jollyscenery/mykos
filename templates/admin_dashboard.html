{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 mt-8 mb-16">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Admin Panel</h1>
            <p class="text-gray-500">Pantau semua pesanan dan aktivitas Agen di sistem.</p>
        </div>
        <div class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-bold">Total Orders: 24</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <h4 class="text-gray-400 text-xs font-bold uppercase">Pesanan Aktif</h4>
            <p class="text-2xl font-bold">12</p>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <h4 class="text-gray-400 text-xs font-bold uppercase">Agen Online</h4>
            <p class="text-2xl font-bold">5</p>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <h4 class="text-gray-400 text-xs font-bold uppercase">Pindahan Hari Ini</h4>
            <p class="text-2xl font-bold">3</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-gray-50 border-b border-gray-100 text-gray-500 font-bold uppercase text-[10px]">
                <tr>
                    <th class="px-6 py-4">User</th>
                    <th class="px-6 py-4">Agen</th>
                    <th class="px-6 py-4">Lokasi</th>
                    <th class="px-6 py-4">Status</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr>
                    <td class="px-6 py-4 font-semibold">Daron</td>
                    <td class="px-6 py-4 text-gray-500">Agen Budi</td>
                    <td class="px-6 py-4 text-gray-500">Setiabudi</td>
                    <td class="px-6 py-4"><span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[10px] font-bold">SURVEYING</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
