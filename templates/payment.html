{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto my-12 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Selesaikan Pembayaran</h2>
    
    <div class="bg-gray-50 p-4 rounded-xl mb-6">
        <p class="text-sm text-gray-500">Total Tagihan (Jasa Survei)</p>
        <p class="text-3xl font-bold text-primary">Rp 50.000</p>
    </div>

    <form action="/user/order/{{ order.id }}/payment" method="POST" class="space-y-4">
        <label class="block text-sm font-bold text-gray-700 mb-2">Pilih Metode Pembayaran</label>
        
        <div class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-primary">
            <input type="radio" name="payment_method" value="bca" id="bca" required class="w-4 h-4 text-primary bg-gray-100 border-gray-300 focus:ring-primary">
            <label for="bca" class="ml-3 font-semibold text-gray-700 w-full cursor-pointer">Transfer Bank BCA</label>
        </div>
        
        <div class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-primary">
            <input type="radio" name="payment_method" value="va" id="va" required class="w-4 h-4 text-primary bg-gray-100 border-gray-300 focus:ring-primary">
            <label for="va" class="ml-3 font-semibold text-gray-700 w-full cursor-pointer">Virtual Account (Mandiri/BNI)</label>
        </div>

        <button type="submit" class="w-full mt-6 bg-primary hover:bg-primarydark text-white font-bold py-3 rounded-xl transition shadow-lg">Bayar Sekarang</button>
    </form>
</div>
{% endblock %}
