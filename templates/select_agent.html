{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto px-4 my-12">
    <h2 class="text-3xl font-bold mb-2 text-gray-800 text-center">Pilih Agen Survei Anda</h2>
    <p class="text-center text-gray-500 mb-8">Pilih agen yang tersedia di sistem untuk memproses pesananmu.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for agent in agents %}
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center">
            <div class="w-20 h-20 rounded-full bg-teal-100 flex items-center justify-center text-primary text-2xl font-bold mb-3">
                {{ agent.full_name[0] }}
            </div>
            <h4 class="font-bold text-gray-800 text-lg">{{ agent.full_name }}</h4>
            <div class="flex items-center text-sm text-yellow-500 mb-6">
                ★ 4.9 <span class="text-gray-400 ml-1">(Telah survei 80+ kos)</span>
            </div>
            <form action="/user/create_order" method="POST" class="w-full">
                <input type="hidden" name="agent_id" value="{{ agent.id }}">
                <button type="submit" class="w-full bg-gray-900 text-white hover:bg-black font-bold py-3 rounded-xl transition duration-200">
                    Pilih Agen Ini
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
